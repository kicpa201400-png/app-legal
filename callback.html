<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TikTok OAuth Callback</title>
  <script>
    // GitHub Pages → localhost:5000 으로 코드를 전달 (브라우저 redirect)
    const qs = window.location.search;
    const code = new URLSearchParams(qs).get('code');
    if (code) {
      window.location.href = 'http://localhost:5000/callback' + qs;
    } else {
      document.getElementById('msg').textContent = '❌ 코드를 받지 못했습니다: ' + qs;
    }
  </script>
</head>
<body>
  <h2 id="msg">TikTok 인증 처리 중...</h2>
</body>
</html>
